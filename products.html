<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1a3a2a">
<title>Hills Sweets NMC · 產品介紹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1a3a2a;
  --green2:#2d5a43;
  --cream:#faf8f4;
  --ink:#1c1c1c;
  --ink2:#555;
  --ink3:#999;
  --line:#ebe7df;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;
  background:var(--cream);
  color:var(--ink);
  padding-bottom:90px;
  -webkit-font-smoothing:antialiased;
}

/* ── hero ── */
.hero{
  background:linear-gradient(168deg,var(--green) 0%,var(--green2) 100%);
  color:#fff;
  text-align:center;
  padding:34px 20px 30px;
  border-radius:0 0 26px 26px;
}
.hero .brand{
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  opacity:.7;
  margin-bottom:10px;
  font-weight:500;
}
.hero h1{
  font-family:'DM Serif Display','Noto Sans TC',serif;
  font-size:30px;
  font-weight:400;
  line-height:1.25;
  letter-spacing:.01em;
}
.hero h1 em{font-style:italic;opacity:.95}
.hero .intro{
  font-size:14.5px;
  opacity:.92;
  margin:12px auto 0;
  line-height:1.65;
  max-width:480px;
  white-space:pre-line;
}
.hero .upd{
  display:inline-block;
  font-size:11px;
  opacity:.6;
  margin-top:14px;
  border:1px solid rgba(255,255,255,.25);
  padding:3px 12px;
  border-radius:99px;
}

/* ── product grid ── */
.grid{
  max-width:680px;
  margin:0 auto;
  padding:20px 14px 10px;
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}

.pcard{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(26,58,42,.08);
  border:1px solid var(--line);
}
.pimg-wrap{
  width:100%;
  aspect-ratio:4/3;
  overflow:hidden;
  background:#f0ede7;
  position:relative;
}
.pimg{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.pbody{padding:15px 17px 19px}
.pname{
  font-size:17.5px;
  font-weight:700;
  line-height:1.4;
  letter-spacing:.01em;
}
.punit{font-size:12px;font-weight:500;opacity:.85}
.pprice{
  display:inline-block;
  background:var(--green);
  color:#fff;
  font-size:15px;
  font-weight:900;
  padding:4px 15px;
  border-radius:99px;
  margin-top:9px;
  letter-spacing:.02em;
}
.pdesc{
  font-size:13.5px;
  color:var(--ink2);
  line-height:1.7;
  margin-top:10px;
  white-space:pre-line;
}

/* ── how to order footer card ── */
.foot{max-width:680px;margin:10px auto 0;padding:0 14px;text-align:center}
.how{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px 16px;
  font-size:14px;
  color:var(--ink2);
  line-height:1.75;
  box-shadow:0 2px 8px rgba(26,58,42,.06);
}
.how strong{color:var(--ink);font-size:15px}
.tag{font-size:11px;color:var(--ink3);margin-top:16px;letter-spacing:.05em}

/* ── sticky bottom hint bar ── */
.bottom-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--green);
  color:#fff;
  text-align:center;
  padding:13px 16px calc(13px + env(safe-area-inset-bottom));
  font-size:14px;
  font-weight:700;
  letter-spacing:.03em;
  box-shadow:0 -3px 14px rgba(0,0,0,.18);
  z-index:50;
}

/* ── loading / empty states ── */
.state{
  min-height:70vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 24px;
}
.state .big{font-size:46px;margin-bottom:14px}
.state .t1{font-size:19px;font-weight:700;color:var(--ink)}
.state .t2{font-size:13.5px;color:var(--ink3);line-height:1.7;margin-top:8px}
.spinner{
  width:34px;height:34px;
  border:3.5px solid var(--line);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-bottom:18px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* gentle entry animation */
.pcard{animation:fadeUp .45s ease both}
.pcard:nth-child(2){animation-delay:.06s}
.pcard:nth-child(3){animation-delay:.12s}
.pcard:nth-child(4){animation-delay:.18s}
.pcard:nth-child(5){animation-delay:.24s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- loading state -->
<div class="state" id="loadingScreen">
  <div class="spinner"></div>
  <div class="t2">載入中…</div>
</div>

<!-- empty / unavailable state -->
<div class="state" id="emptyScreen" style="display:none">
  <div class="big">🍃</div>
  <div class="t1">暫時未有產品介紹</div>
  <div class="t2">請等待 WhatsApp 群組通知<br>Check back soon!</div>
</div>

<!-- main content -->
<div id="mainScreen" style="display:none">
  <div class="hero">
    <div class="brand">Hills Sweets NMC</div>
    <h1 id="pg-title">產品介紹</h1>
    <div class="intro" id="pg-intro" style="display:none"></div>
    <div class="upd" id="pg-upd" style="display:none"></div>
  </div>
  <div class="grid" id="pg-grid"></div>
  <div class="foot">
    <div class="how">
      🛒 <strong>如何落單 How to order</strong><br>
      請喺 WhatsApp 群組內留言落單<br>
      Reply in our WhatsApp group to place your order
    </div>
    <div class="tag">HILLS SWEETS NMC · WOLLONGONG NSW</div>
  </div>
</div>

<!-- sticky bottom hint -->
<div class="bottom-bar" id="bottomBar" style="display:none">💬 喺 WhatsApp 群組留言即可落單</div>

<script>
/* ── CONFIG — same Apps Script as customer-order.html ── */
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbyaoVmbMkgmm6ODjdXHJGbP-KyNbFmxbIeCRDApbLd-jt3stNwxdSE8mrk16ufk8JcFqw/exec';
var CACHE_KEY='om_sc_pub_cache';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── BOOT: fetch showcase — fetch first, JSONP fallback, then cache ── */
window.addEventListener('DOMContentLoaded',function(){

  window.hillsShowcaseCallback=function(data){
    if(data&&data.items&&data.items.length){
      try{localStorage.setItem(CACHE_KEY,JSON.stringify(data));}catch(e){}
      render(data);
    } else {
      loadFromCache();
    }
  };

  fetch(SCRIPT_URL+'?action=getshowcase')
    .then(function(r){return r.json();})
    .then(function(data){
      if(data&&data.items&&data.items.length){
        try{localStorage.setItem(CACHE_KEY,JSON.stringify(data));}catch(e){}
        render(data);
      } else {
        loadFromCache();
      }
    })
    .catch(function(){
      /* fetch blocked (iOS CORS) — JSONP fallback */
      var s=document.createElement('script');
      s.src=SCRIPT_URL+'?action=getshowcase&callback=hillsShowcaseCallback';
      s.onerror=function(){loadFromCache();};
      document.head.appendChild(s);
    });
});

function loadFromCache(){
  var data=null;
  try{data=JSON.parse(localStorage.getItem(CACHE_KEY));}catch(e){}
  if(data&&data.items&&data.items.length) render(data);
  else showEmpty();
}

function showEmpty(){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('emptyScreen').style.display='flex';
}

function render(data){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
  document.getElementById('bottomBar').style.display='block';

  if(data.title){
    document.getElementById('pg-title').textContent=data.title;
    document.title='Hills Sweets NMC · '+data.title;
  }
  if(data.intro){
    var iEl=document.getElementById('pg-intro');
    iEl.textContent=data.intro;
    iEl.style.display='block';
  }
  if(data.publishedAt){
    var d=new Date(data.publishedAt);
    var uEl=document.getElementById('pg-upd');
    uEl.textContent='更新於 '+d.toLocaleDateString('zh-HK',{day:'numeric',month:'numeric',year:'numeric'});
    uEl.style.display='inline-block';
  }

  var html='';
  data.items.forEach(function(it){
    html+=
      '<div class="pcard">'+
        (it.photo?'<div class="pimg-wrap"><img class="pimg" src="'+it.photo+'" alt="'+esc(it.name)+'" loading="lazy"></div>':'')+
        '<div class="pbody">'+
          '<div class="pname">'+esc(it.name)+'</div>'+
          (it.price!=null&&it.price!==''?'<div class="pprice">A$'+parseFloat(it.price).toFixed(2)+(it.unit?' <span class="punit">/ '+esc(it.unit).replace(/^\s*\/\s*/,'')+'</span>':'')+'</div>':'')+
          (it.desc?'<div class="pdesc">'+esc(it.desc)+'</div>':'')+
        '</div>'+
      '</div>';
  });
  document.getElementById('pg-grid').innerHTML=html;
}
</script>
</body>
</html>
